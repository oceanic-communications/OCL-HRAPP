# OCL HR — merge with base compose for Playwright E2E:
#   docker compose -f docker-compose.yml -f docker-compose.development.yml --profile e2e up
volumes:
  playwright_node_modules:

services:
  playwright:
    profiles:
      - e2e
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /app
    depends_on:
      app:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PLAYWRIGHT_BASE_URL: http://app
      PLAYWRIGHT_MAILHOG_URL: http://mailhog:8025
      CI: "1"
    volumes:
      - .:/app
      - playwright_node_modules:/app/node_modules
    command: sh -c "npm ci && npx playwright test"
